 - name: Deploy to Tomcat
   hosts: web
   become: yes
   
   tasks: 
    
    - name: Copy WAR file to Tomcat 
      copy:
       src: ''
       dest: '/opt/tomcat/webapps/MavenAnsible.war'
       remote_src: no
       
    - name: Restart Tomcat
      shell: |
       /opt/tomcat/bin/shutdown.sh || true
       sleep 5
       /opt/tomcat/bin/startup.sh
